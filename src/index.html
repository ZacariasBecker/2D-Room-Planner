<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Room Planner - Dark Mode</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --ps-bg-main: #1e1e1e;
            --ps-bg-panel: #252526;
            --ps-bg-header: #333333;
            --ps-border: #444444;
            --room-bg: #e9ecef;
            --room-border: #adb5bd;
            --danger-bg: #ffcccc;
        }

        body {
            background-color: var(--ps-bg-main);
            overflow: hidden;
            user-select: none;
            color: #cccccc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .topbar {
            background-color: var(--ps-bg-header);
            border-bottom: 1px solid var(--ps-border);
            height: 60px;
        }

        .sidebar-left {
            width: 340px;
            background-color: var(--ps-bg-panel);
            border-right: 1px solid var(--ps-border);
            overflow-y: auto;
        }

        .sidebar-right {
            width: 350px;
            background-color: var(--ps-bg-panel);
            border-left: 1px solid var(--ps-border);
            display: flex;
            flex-direction: column;
        }

        .canvas-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto;
            padding: 60px;
            position: relative;
            background-image: radial-gradient(#444 1px, transparent 1px);
            background-size: 20px 20px;
        }

        #roomWrapper {
            position: relative;
            transition: width 0.2s, height 0.2s;
        }

        #room {
            position: absolute;
            top: 0;
            left: 0;
            background-color: var(--room-bg);
            border: 4px solid var(--room-border);
            box-sizing: content-box;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: background-color 0.2s, border-color 0.2s;
            transform-origin: top left;
        }

        .room-object {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.8rem;
            font-weight: bold;
            color: rgba(0, 0, 0, 0.8);
            cursor: grab;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 0, 0, 0.2);
            text-align: center;
            padding: 2px;
            overflow: hidden;
            border-radius: 4px;
            transition: outline 0.1s;
        }

        .room-object:active {
            cursor: grabbing;
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.6);
        }

        .room-object.selected-obj {
            outline: 3px solid #0d6efd;
            z-index: 999 !important;
        }

        .fixture {
            position: absolute;
            background-color: #5bc0de;
            border: 2px solid #2c3e50;
            cursor: grab;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.7rem;
            color: #000;
            z-index: 20;
            font-weight: bold;
            transition: outline 0.1s;
            text-align: center;
        }

        .fixture.door {
            background-color: #f0ad4e;
            justify-content: flex-start;
            align-items: flex-start;
        }

        .fixture:active {
            cursor: grabbing;
        }

        .fixture.selected-obj {
            outline: 3px solid #0d6efd;
            border-color: #0d6efd !important;
            z-index: 999 !important;
        }

        .fixture.selected-obj .door-svg path,
        .fixture.selected-obj .door-svg line {
            stroke: #0d6efd !important;
        }

        .dim-line {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.75rem;
            font-weight: bold;
            color: #e74c3c;
            pointer-events: none;
            z-index: 5;
        }

        .dim-line.horizontal {
            border-bottom: 1.5px dashed #e74c3c;
            height: 25px;
        }

        .dim-line.vertical {
            border-right: 1.5px dashed #e74c3c;
            width: 25px;
            flex-direction: column;
        }

        .dim-line span {
            background-color: #252526;
            color: #fff;
            padding: 2px 4px;
            border-radius: 4px;
            white-space: nowrap;
            border: 1px solid #444;
        }

        .color-picker-sm {
            padding: 0;
            height: 30px;
            border: none;
            background: none;
        }

        body.ruler-active #room,
        body.ruler-active .room-object,
        body.ruler-active .fixture {
            cursor: crosshair !important;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--ps-bg-panel);
        }

        ::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #777;
        }

        .card {
            background-color: #2d2d30;
            border-color: var(--ps-border);
        }

        .form-control,
        .form-select {
            background-color: #3e3e42;
            color: #fff;
            border-color: #555;
        }

        .form-control:focus,
        .form-select:focus {
            background-color: #3e3e42;
            color: #fff;
            border-color: #0d6efd;
            box-shadow: none;
        }

        .layer-item:hover {
            background-color: #3e3e42;
        }

        .inspector-card {
            transition: border-color 0.2s, background-color 0.2s;
            cursor: pointer;
        }

        .inspector-card:hover {
            background-color: #3e3e42 !important;
        }

        .app-footer {
            background-color: var(--ps-bg-header);
            border-top: 1px solid var(--ps-border);
            height: 30px;
            font-size: 0.75rem;
            color: #888;
        }

        .app-footer a {
            color: #0d6efd;
            text-decoration: none;
            transition: color 0.2s;
        }

        .app-footer a:hover {
            color: #0a58ca;
            text-decoration: underline;
        }
    </style>
</head>

<body class="d-flex flex-column vh-100">

    <header class="topbar d-flex align-items-center justify-content-between px-3 shadow-sm z-3">

        <div class="d-flex align-items-center gap-2">
            <span class="fw-bold text-primary me-3 fs-5"><i class="bi bi-house-gear-fill me-1"></i> <span
                    data-i18n="app_title">2D Room Planner</span></span>

            <button class="btn btn-outline-secondary btn-sm" onclick="undo()" title="Undo (Ctrl+Z)"><i
                    class="bi bi-arrow-counterclockwise"></i></button>
            <button class="btn btn-outline-secondary btn-sm" onclick="redo()" title="Redo (Ctrl+Y)"><i
                    class="bi bi-arrow-clockwise"></i></button>
            <div class="vr mx-1 text-secondary"></div>
            <button class="btn btn-primary btn-sm fw-bold" onclick="exportProject()" data-i18n="save">Save</button>
            <button class="btn btn-outline-primary btn-sm fw-bold"
                onclick="document.getElementById('importFile').click()" data-i18n="import">Import</button>
            <input type="file" id="importFile" accept=".json" style="display: none;" onchange="importProject(event)">
        </div>

        <div class="d-flex align-items-center gap-4">
            <input type="text" id="projectName"
                class="form-control form-control-sm bg-dark text-light border-secondary text-center fw-bold"
                value="new project" style="width: 200px;">

            <div class="d-flex gap-3 text-center" style="font-size: 0.85rem;">
                <div><span class="text-secondary" data-i18n="total_area">Total Area:</span> <strong class="text-light"
                        id="areaTotal">0.00</strong> m²</div>
                <div><span class="text-secondary" data-i18n="occupied">Occupied:</span> <strong class="text-warning"
                        id="areaOcc">0.00</strong> m²</div>
                <div><span class="text-secondary" data-i18n="free">Free:</span> <strong class="text-success"
                        id="areaFree">0.00</strong> m²</div>
            </div>
        </div>

        <div class="d-flex align-items-center gap-2">
            <span class="text-secondary small" data-i18n="zoom">Zoom:</span>
            <div class="btn-group btn-group-sm me-2">
                <button class="btn btn-secondary" onclick="setZoom(0.8)"><i class="bi bi-dash"></i></button>
                <span id="zoomVal" class="input-group-text bg-dark text-light border-secondary"
                    style="width: 65px; justify-content: center;">100%</span>
                <button class="btn btn-secondary" onclick="setZoom(1.25)"><i class="bi bi-plus"></i></button>
            </div>
            <div class="vr mx-1 text-secondary"></div>
            <button class="btn btn-outline-light btn-sm" data-bs-toggle="modal" data-bs-target="#settingsModal"
                title="Settings"><i class="bi bi-gear-fill"></i></button>
        </div>
    </header>

    <div class="d-flex flex-grow-1 overflow-hidden">

        <aside class="sidebar-left p-3">

            <div class="card mb-3 shadow-sm">
                <div class="card-body p-3">
                    <h6 class="card-title fw-bold text-light mb-3"><i class="bi bi-rulers me-2"></i><span
                            data-i18n="room_dim">Room Dimensions</span></h6>
                    <div class="row g-2">
                        <div class="col-6">
                            <label class="form-label small mb-0 text-secondary" data-i18n="width">Width (cm)</label>
                            <input type="number" class="form-control form-control-sm" id="roomW" value="400"
                                onchange="updateRoom(true)">
                        </div>
                        <div class="col-6">
                            <label class="form-label small mb-0 text-secondary" data-i18n="length">Length (cm)</label>
                            <input type="number" class="form-control form-control-sm" id="roomH" value="300"
                                onchange="updateRoom(true)">
                        </div>
                    </div>
                    <button class="btn btn-sm btn-outline-warning w-100 mt-3" onclick="rotateRoom()">
                        <i class="bi bi-arrow-clockwise"></i> <span data-i18n="rotate_room">Rotate Room</span>
                    </button>
                </div>
            </div>

            <div class="card mb-3 shadow-sm">
                <div class="card-body p-3">
                    <h6 class="card-title fw-bold text-light mb-3"><i class="bi bi-tools me-2"></i><span
                            data-i18n="tools">Tools</span></h6>
                    <button id="btnRuler" class="btn btn-sm btn-outline-info w-100 mb-3 fw-bold"
                        onclick="toggleRuler()"><i class="bi bi-rulers"></i> <span data-i18n="ruler">Free
                            Ruler</span></button>

                    <div class="form-check form-switch small mb-2">
                        <input class="form-check-input" type="checkbox" id="showGrid" onchange="toggleGrid()">
                        <label class="form-check-label text-light" for="showGrid" data-i18n="show_grid">Show
                            Grid</label>
                    </div>
                    <div class="form-check form-switch small mb-2">
                        <input class="form-check-input" type="checkbox" id="snapGrid" onchange="toggleSnap()">
                        <label class="form-check-label text-light" for="snapGrid" data-i18n="snap_grid">Snap to
                            Grid</label>
                    </div>
                    <div class="form-check form-switch small mb-3">
                        <input class="form-check-input" type="checkbox" id="snapWall" onchange="toggleSnapWall()">
                        <label class="form-check-label text-light" for="snapWall" data-i18n="snap_walls">Snap to
                            Walls</label>
                    </div>

                    <div class="d-flex align-items-center gap-2 mb-3">
                        <label class="small text-secondary mb-0 w-100" data-i18n="grid_size">Grid/Snap Size:</label>
                        <div class="input-group input-group-sm">
                            <input type="number" class="form-control" id="gridSize" value="25"
                                oninput="toggleGrid(); toggleSnap();">
                            <span class="input-group-text bg-secondary border-secondary">cm</span>
                        </div>
                    </div>

                    <div class="form-check form-switch small">
                        <input class="form-check-input" type="checkbox" id="showDist" onchange="updateDistances()">
                        <label class="form-check-label text-light" for="showDist" data-i18n="auto_dims">Auto
                            Dimensions</label>
                    </div>
                </div>
            </div>

            <div class="card mb-3 shadow-sm border-primary">
                <div class="card-body p-3">
                    <h6 class="card-title fw-bold text-primary mb-3"><i class="bi bi-box-seam me-2"></i><span
                            data-i18n="new_obj">New Object</span></h6>
                    <div class="mb-2">
                        <input type="text" class="form-control form-control-sm" id="objName" data-i18n-ph="name_ph"
                            placeholder="Name (e.g., Table)">
                    </div>
                    <div class="row g-2 mb-3">
                        <div class="col-3">
                            <label class="form-label small mb-0 text-secondary">W (cm)</label>
                            <input type="number" class="form-control form-control-sm" id="objW" value="100">
                        </div>
                        <div class="col-3">
                            <label class="form-label small mb-0 text-secondary">L (cm)</label>
                            <input type="number" class="form-control form-control-sm" id="objH" value="100">
                        </div>
                        <div class="col-3">
                            <label class="form-label small mb-0 text-secondary" data-i18n="layer">Layer</label>
                            <input type="number" class="form-control form-control-sm text-center" id="objLayer"
                                value="1">
                        </div>
                        <div class="col-3">
                            <label class="form-label small mb-0 text-secondary" data-i18n="color">Color</label>
                            <input type="color"
                                class="form-control form-control-color form-control-sm w-100 px-1 color-picker-sm"
                                id="objColor" value="#baffc9">
                        </div>
                    </div>
                    <button class="btn btn-primary btn-sm w-100 fw-bold" onclick="addObject()"
                        data-i18n="create_obj">Create Object</button>
                </div>
            </div>

            <div class="card shadow-sm border-info">
                <div class="card-body p-3">
                    <h6 class="card-title fw-bold text-info mb-3"><i class="bi bi-door-open me-2"></i><span
                            data-i18n="structures">Structures</span></h6>
                    <div class="mb-2">
                        <input type="text" class="form-control form-control-sm" id="fixName"
                            placeholder="Name (e.g., Window 1)">
                    </div>
                    <div class="mb-2">
                        <label class="form-label small mb-0 text-secondary" data-i18n="type">Type</label>
                        <select class="form-select form-select-sm" id="fixType">
                            <option value="window" data-i18n="window">Window</option>
                            <option value="door" data-i18n="door">Door</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small mb-0 text-secondary" data-i18n="size">Size (cm)</label>
                        <input type="number" class="form-control form-control-sm" id="fixSize" value="80">
                    </div>
                    <button class="btn btn-info text-dark btn-sm w-100 fw-bold" onclick="addFixture()"
                        data-i18n="add_wall">Add to Wall</button>
                </div>
            </div>

        </aside>

        <main class="canvas-container" id="canvasContainer">
            <div id="roomWrapper">
                <div id="room">
                    <svg id="distOverlay"
                        style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index: 15; overflow:visible;"></svg>
                    <svg id="rulerOverlay"
                        style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index: 9999; overflow:visible;"></svg>
                </div>
            </div>
        </main>

        <aside class="sidebar-right">
            <div class="flex-grow-1 d-flex flex-column overflow-hidden">
                <div class="bg-dark text-light p-2 border-bottom border-secondary fw-bold text-center"
                    style="font-size: 0.85rem; letter-spacing: 1px;" data-i18n="inspector">
                    OBJECT INSPECTOR
                </div>
                <div class="p-2 overflow-y-auto flex-grow-1" id="objectList"></div>
                <div class="p-2 overflow-y-auto border-top border-secondary" id="fixtureList" style="max-height: 35%;">
                </div>
            </div>

            <div class="border-top"
                style="height: 250px; background-color: #1e1e1e; display: flex; flex-direction: column;">
                <div class="bg-dark text-light p-2 border-bottom border-secondary fw-bold text-center"
                    style="font-size: 0.85rem; letter-spacing: 1px;" data-i18n="layers_panel">
                    LAYERS
                </div>
                <div class="p-2 overflow-y-auto flex-grow-1" id="layersList"></div>
            </div>
        </aside>

    </div>

    <footer class="app-footer d-flex align-items-center justify-content-center px-3">
        <span class="small">
            Powered by
            <a href="https://github.com/ZacariasBecker/2D-Room-Planner" target="_blank" rel="noopener noreferrer"
                class="fw-bold">
                <i class="bi bi-github me-1"></i>Zacarias Becker
            </a>
        </span>
    </footer>

    <div class="modal fade" id="settingsModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content bg-dark text-light border-secondary">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title fw-bold" data-i18n="settings_title"><i class="bi bi-gear me-2"></i>Settings
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label fw-bold text-secondary" data-i18n="language">Language / Idioma</label>
                        <select class="form-select bg-dark text-light border-secondary" id="langSelect"
                            onchange="changeLanguage(this.value)">
                            <option value="en">English (US)</option>
                            <option value="pt-br">Português (Brasil)</option>
                            <option value="es">Español</option>
                            <option value="fr">Français</option>
                            <option value="de">Deutsch</option>
                            <option value="it">Italiano</option>
                            <option value="nl">Nederlands</option>
                            <option value="pl">Polski</option>
                            <option value="sv">Svenska</option>
                            <option value="ru">Русский</option>
                            <option value="cs">Čeština</option>
                            <option value="ro">Română</option>
                            <option value="el">Ελληνικά</option>
                            <option value="da">Dansk</option>
                            <option value="fi">Suomi</option>
                            <option value="hu">Magyar</option>
                            <option value="pt-pt">Português (Portugal)</option>
                            <option value="uk">Українська</option>
                            <option value="tr">Türkçe</option>
                            <option value="zh">中文 (Mandarin)</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </div>

        let currentLang = 'en';

        function t(key) {
            const langDict = translations[currentLang] || translations['en'];
            return langDict[key] || translations['en'][key] || key;
        }

        function changeLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                el.innerText = t(key);
            });
            document.querySelectorAll('[data-i18n-ph]').forEach(el => {
                const key = el.getAttribute('data-i18n-ph');
                el.placeholder = t(key);
            });
            updateSidebarLists();
            updateLayersPanel();
        }

        let room = { w: 400, h: 300 };
        let scale = 1;
        let objects = [];
        let fixtures = [];
        let objectIdCounter = 0;
        let fixtureIdCounter = 0;

        let historyStack = [];
        let historyIndex = -1;
        let hiddenLayers = new Set();

        let selectedObjects = new Set();
        let selectedFixtures = new Set();

        let dragGroup = [];
        let draggedFixture = null;
        let dragType = null;
        let startMouseX = 0, startMouseY = 0;
        let snapGridSize = 25;
        let isSnap = false, isSnapWall = false;
        let rulerMode = false, rulerStart = null;

        const roomEl = document.getElementById('room');
        const roomWrapper = document.getElementById('roomWrapper');
        const objectListEl = document.getElementById('objectList');
        const fixtureListEl = document.getElementById('fixtureList');
        const distOverlay = document.getElementById('distOverlay');
        const rulerOverlay = document.getElementById('rulerOverlay');
        const layersListEl = document.getElementById('layersList');

        function init() {
            changeLanguage('en');
            updateRoom(false);
            saveState();

            document.addEventListener('mousemove', handleDrag);
            document.addEventListener('mouseup', stopDrag);
            document.addEventListener('keydown', handleKeys);

            roomEl.addEventListener('mousedown', (e) => {
                if (rulerMode) {
                    const rect = roomEl.getBoundingClientRect();
                    rulerStart = { x: (e.clientX - rect.left) / scale, y: (e.clientY - rect.top) / scale };
                } else if (e.target === roomEl) {
                    selectedObjects.clear();
                    selectedFixtures.clear();
                    renderObjectsStyle();
                    renderFixturesStyle();
                    document.querySelectorAll('.inspector-card').forEach(el => el.classList.remove('border-primary', 'border-2'));
                }
            });
        }

        function cloneState() {
            return {
                room: { ...room },
                objects: objects.map(o => ({ ...o, el: null })),
                fixtures: fixtures.map(f => ({ ...f, el: null, dim1El: null, dim2El: null, span1: null, span2: null }))
            };
        }

        function saveState() {
            const current = cloneState();
            if (historyIndex < historyStack.length - 1) historyStack = historyStack.slice(0, historyIndex + 1);
            historyStack.push(current);
            historyIndex++;
            updateLayersPanel();
        }

        function restoreState(stateData) {
            room = { ...stateData.room };
            objects = (stateData.objects || []).map(o => ({ ...o, el: null }));
            fixtures = (stateData.fixtures || []).map(f => ({ ...f, name: f.name || t(f.type), el: null, dim1El: null, dim2El: null }));

            selectedObjects.clear();
            selectedFixtures.clear();

            objectIdCounter = objects.length > 0 ? Math.max(...objects.map(o => o.id)) + 1 : 0;
            fixtureIdCounter = fixtures.length > 0 ? Math.max(...fixtures.map(f => f.id)) + 1 : 0;

            document.getElementById('roomW').value = room.w;
            document.getElementById('roomH').value = room.h;

            if (stateData.projectName) {
                document.getElementById('projectName').value = stateData.projectName;
            }
            if (stateData.settings) {
                document.getElementById('gridSize').value = stateData.settings.gridSize || 25;
                document.getElementById('showGrid').checked = !!stateData.settings.showGrid;
                document.getElementById('snapGrid').checked = !!stateData.settings.snapGrid;
                document.getElementById('snapWall').checked = !!stateData.settings.snapWall;
                document.getElementById('showDist').checked = !!stateData.settings.showDist;

                toggleGrid();
                toggleSnap();
                toggleSnapWall();

                if (stateData.settings.language) {
                    document.getElementById('langSelect').value = stateData.settings.language;
                    changeLanguage(stateData.settings.language);
                }
            }

            updateRoom(false);
            updateLayersPanel();
        }

        function undo() { if (historyIndex > 0) { historyIndex--; restoreState(historyStack[historyIndex]); } }
        function redo() { if (historyIndex < historyStack.length - 1) { historyIndex++; restoreState(historyStack[historyIndex]); } }

        function handleKeys(e) {
            if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
            if (e.ctrlKey && e.key === 'y') { e.preventDefault(); redo(); }
            if (e.key === 'Delete' || e.key === 'Backspace') {
                if (selectedObjects.size > 0 && !['INPUT', 'SELECT', 'TEXTAREA'].includes(e.target.tagName)) {
                    objects = objects.filter(o => !selectedObjects.has(o.id));
                    selectedObjects.clear();
                    renderObjects(); updateSidebarLists(); saveState();
                }
                if (selectedFixtures.size > 0 && !['INPUT', 'SELECT', 'TEXTAREA'].includes(e.target.tagName)) {
                    fixtures = fixtures.filter(f => !selectedFixtures.has(f.id));
                    selectedFixtures.clear();
                    renderFixtures(); updateSidebarLists(); saveState();
                }
            }
        }

        function exportProject() {
            const projectData = cloneState();

            const projName = document.getElementById('projectName').value.trim() || "new project";
            projectData.projectName = projName;

            projectData.settings = {
                language: currentLang,
                showGrid: document.getElementById('showGrid').checked,
                snapGrid: document.getElementById('snapGrid').checked,
                snapWall: document.getElementById('snapWall').checked,
                gridSize: document.getElementById('gridSize').value,
                showDist: document.getElementById('showDist').checked
            };

            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(projectData));
            const a = document.createElement('a');
            a.href = dataStr;
            a.download = `${projName.replace(/\s+/g, '_')}.json`;
            document.body.appendChild(a);
            a.click();
            a.remove();
        }

        function importProject(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function (e) {
                try {
                    const data = JSON.parse(e.target.result);
                    restoreState(data);
                    saveState();
                    document.getElementById('importFile').value = '';
                }
                catch (err) { alert("Error importing project."); }
            };
            reader.readAsText(file);
        }

        function setZoom(factor) { scale *= factor; if (scale < 0.1) scale = 0.1; if (scale > 5) scale = 5; applyZoom(); }
        function applyZoom() {
            document.getElementById('zoomVal').innerText = Math.round(scale * 100) + '%';
            roomEl.style.transform = `scale(${scale})`;
            roomWrapper.style.width = (room.w * scale) + 'px';
            roomWrapper.style.height = (room.h * scale) + 'px';
        }

        function toggleGrid() {
            const show = document.getElementById('showGrid').checked;
            const size = parseInt(document.getElementById('gridSize').value) || 25;
            if (show) {
                roomEl.style.backgroundImage = `linear-gradient(to right, #bbb 1px, transparent 1px), linear-gradient(to bottom, #bbb 1px, transparent 1px)`;
                roomEl.style.backgroundSize = `${size}px ${size}px`;
            } else { roomEl.style.backgroundImage = 'none'; }
        }

        function toggleSnap() { isSnap = document.getElementById('snapGrid').checked; snapGridSize = parseInt(document.getElementById('gridSize').value) || 25; }
        function toggleSnapWall() { isSnapWall = document.getElementById('snapWall').checked; }

        function updateRoom(recordHistory = false) {
            room.w = parseInt(document.getElementById('roomW').value) || 100;
            room.h = parseInt(document.getElementById('roomH').value) || 100;
            roomEl.style.width = room.w + 'px'; roomEl.style.height = room.h + 'px';
            checkCollisions(); renderFixtures(); toggleGrid(); applyZoom(); updateDistances(); updateArea();
            if (recordHistory) saveState();
        }

        function rotateRoom() {
            const oldW = room.w;
            const oldH = room.h;
            room.w = oldH;
            room.h = oldW;
            document.getElementById('roomW').value = room.w;
            document.getElementById('roomH').value = room.h;

            objects.forEach(obj => {
                const oldX = obj.x;
                const oldY = obj.y;
                const oldObjW = obj.w;
                const oldObjH = obj.h;
                obj.w = oldObjH;
                obj.h = oldObjW;
                obj.x = room.w - oldY - obj.w;
                obj.y = oldX;
            });

            fixtures.forEach(fix => {
                const oldPos = fix.pos;
                const oldWall = fix.wall;
                if (oldWall === 'top') {
                    fix.wall = 'right';
                    fix.pos = oldPos;
                } else if (oldWall === 'right') {
                    fix.wall = 'bottom';
                    fix.pos = room.w - oldPos - fix.size;
                } else if (oldWall === 'bottom') {
                    fix.wall = 'left';
                    fix.pos = room.h - oldPos - fix.size;
                } else if (oldWall === 'left') {
                    fix.wall = 'top';
                    fix.pos = oldPos;
                }
            });

            renderObjects();
            updateRoom(true);
            updateSidebarLists();
        }

        function updateArea() {
            const tot = (room.w * room.h) / 10000;
            let occ = 0;
            objects.forEach(o => { if (!hiddenLayers.has(o.layer)) occ += (o.w * o.h) / 10000; });
            document.getElementById('areaTotal').innerText = tot.toFixed(2);
            document.getElementById('areaOcc').innerText = occ.toFixed(2);
            document.getElementById('areaFree').innerText = Math.max(0, tot - occ).toFixed(2);
        }

        function toggleRuler() {
            rulerMode = !rulerMode;
            document.getElementById('btnRuler').classList.toggle('active', rulerMode);
            document.body.classList.toggle('ruler-active', rulerMode);
            if (!rulerMode) rulerOverlay.innerHTML = '';
        }

        function updateLayersPanel() {
            const layerSet = new Set(objects.map(o => o.layer));
            const layers = Array.from(layerSet).sort((a, b) => b - a);
            layersListEl.innerHTML = '';

            if (layers.length === 0) {
                layersListEl.innerHTML = `<div class="text-muted small text-center mt-3">${t('empty_layer')}</div>`;
                return;
            }
            layers.forEach(l => {
                const isHidden = hiddenLayers.has(l);
                const div = document.createElement('div');
                div.className = 'd-flex align-items-center justify-content-between mb-2 p-2 rounded layer-item bg-dark border border-secondary shadow-sm';
                div.innerHTML = `
                    <span class="fw-bold small text-light"><i class="bi bi-stack me-2 text-secondary"></i>${t('layer')} ${l}</span>
                    <button class="btn btn-sm ${isHidden ? 'btn-outline-secondary' : 'btn-outline-light'}" onclick="toggleLayer(${l})">
                        <i class="bi bi-eye${isHidden ? '-slash text-muted' : '-fill'}"></i>
                    </button>
                `;
                layersListEl.appendChild(div);
            });
        }

        function toggleLayer(l) {
            if (hiddenLayers.has(l)) hiddenLayers.delete(l);
            else { hiddenLayers.add(l); objects.filter(o => o.layer === l).forEach(o => selectedObjects.delete(o.id)); }
            renderObjects(); updateLayersPanel(); updateArea(); updateSidebarLists();
        }

        function highlightInspectorItem(type, id) {
            document.querySelectorAll('.inspector-card').forEach(el => {
                el.classList.remove('border-primary', 'border-2');
            });
            const cardId = type === 'object' ? `insp-obj-${id}` : `insp-fix-${id}`;
            const card = document.getElementById(cardId);
            if (card) {
                card.classList.add('border-primary', 'border-2');
                card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        function highlightCanvasItem(type, id) {
            selectedObjects.clear();
            selectedFixtures.clear();

            if (type === 'object') {
                const obj = objects.find(o => o.id === id);
                if (obj && hiddenLayers.has(obj.layer)) {
                    hiddenLayers.delete(obj.layer);
                    updateLayersPanel();
                    renderObjects();
                }
                selectedObjects.add(id);
            } else if (type === 'fixture') {
                selectedFixtures.add(id);
            }

            renderObjectsStyle();
            renderFixturesStyle();
        }

        function addObject() {
            const name = document.getElementById('objName').value || t('new_obj');
            const w = parseInt(document.getElementById('objW').value) || 50;
            const h = parseInt(document.getElementById('objH').value) || 50;
            const color = document.getElementById('objColor').value;
            const layer = parseInt(document.getElementById('objLayer').value) || 1;

            if (hiddenLayers.has(layer)) hiddenLayers.delete(layer);

            const newId = objectIdCounter++;
            objects.push({ id: newId, name, w, h, color, layer, locked: false, x: room.w / 2 - w / 2, y: room.h / 2 - h / 2, el: null });

            renderObjects(); updateSidebarLists(); saveState();

            highlightCanvasItem('object', newId);
            highlightInspectorItem('object', newId);
        }

        function rotateObject(id) {
            const obj = objects.find(o => o.id === id);
            if (obj && !obj.locked) { const t = obj.w; obj.w = obj.h; obj.h = t; renderObjects(); updateSidebarLists(); saveState(); }
        }

        function removeObject(id) {
            objects = objects.filter(o => o.id !== id);
            selectedObjects.delete(id);
            renderObjects(); updateSidebarLists(); saveState();
        }

        function updateObjectProp(id, prop, value) {
            const obj = objects.find(o => o.id === id); if (!obj) return;
            if (prop === 'w' || prop === 'h') value = parseInt(value) || 10;
            if (prop === 'layer') { value = parseInt(value) || 1; if (hiddenLayers.has(value)) hiddenLayers.delete(value); }
            obj[prop] = value;
            renderObjects(); updateLayersPanel(); updateArea(); saveState();
        }

        function toggleLock(id) { const obj = objects.find(o => o.id === id); if (obj) { obj.locked = !obj.locked; renderObjects(); updateSidebarLists(); saveState(); } }

        function addFixture() {
            const type = document.getElementById('fixType').value;
            const wall = 'top';
            const size = parseInt(document.getElementById('fixSize').value) || 80;

            const inputName = document.getElementById('fixName').value;
            const name = inputName ? inputName : t(type);

            let pos = room.w / 2 - size / 2;

            const newId = fixtureIdCounter++;
            fixtures.push({ id: newId, name, type, wall, size, pos, thickness: 12, flip: false, el: null, locked: false });

            renderFixtures(); updateSidebarLists(); saveState();

            highlightCanvasItem('fixture', newId);
            highlightInspectorItem('fixture', newId);
        }

        function removeFixture(id) {
            fixtures = fixtures.filter(f => f.id !== id);
            selectedFixtures.delete(id);
            renderFixtures(); updateSidebarLists(); saveState();
        }

        function flipFixture(id) { const fix = fixtures.find(f => f.id === id); if (fix && fix.type === 'door') { fix.flip = !fix.flip; renderFixtures(); saveState(); } }

        function updateFixtureProp(id, prop, value) {
            const fix = fixtures.find(f => f.id === id);
            if (!fix) return;
            if (prop === 'size') {
                value = parseInt(value) || 50;
            }
            fix[prop] = value;
            renderFixtures();
            updateSidebarLists();
            saveState();
        }

        function toggleLockFixture(id) {

                else { leaf = `<line x1="0" y1="${s}" x2="${s}" y2="${s}" stroke="#2c3e50" stroke-width="3" />`; path = `<path d="M 0 ${s} L ${s} ${s} A ${s} ${s} 0 0 0 0 0 Z" fill="rgba(240,173,78,0.3)" stroke="#2c3e50" stroke-width="1.5" stroke-dasharray="4" />`; }

        function updateFixtureStyle(fix) {
            if (!fix.el) return;

        function updateDistances() {
            distOverlay.innerHTML = '';
            if (!document.getElementById('showDist').checked) return;
            let svg = '';
            objects.forEach(obj => {
                if (hiddenLayers.has(obj.layer)) return;
                let d = { top: { y: 0, l: obj.y }, bottom: { y: room.h, l: room.h - (obj.y + obj.h) }, left: { x: 0, l: obj.x }, right: { x: room.w, l: room.w - (obj.x + obj.w) } };
                objects.forEach(ot => {
                    if (ot.id === obj.id || ot.layer !== obj.layer || hiddenLayers.has(ot.layer)) return;
                    if (obj.x < ot.x + ot.w && obj.x + obj.w > ot.x) {
                        if (ot.y + ot.h <= obj.y) { let v = obj.y - (ot.y + ot.h); if (v < d.top.l) { d.top.y = ot.y + ot.h; d.top.l = v; } }
                        if (ot.y >= obj.y + obj.h) { let v = ot.y - (obj.y + obj.h); if (v < d.bottom.l) { d.bottom.y = ot.y; d.bottom.l = v; } }
                    }
                    if (obj.y < ot.y + ot.h && obj.y + obj.h > ot.y) {
                        if (ot.x + ot.w <= obj.x) { let v = obj.x - (ot.x + ot.w); if (v < d.left.l) { d.left.x = ot.x + ot.w; d.left.l = v; } }
                        if (ot.x >= obj.x + obj.w) { let v = ot.x - (obj.x + obj.w); if (v < d.right.l) { d.right.x = ot.x; d.right.l = v; } }

                const mk = (x1, y1, x2, y2, v) => v <= 0 ? '' : `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#0d6efd" stroke-dasharray="4" stroke-width="1.5"/><rect x="${(x1 + x2) / 2 - 15}" y="${(y1 + y2) / 2 - 8}" width="30" height="16" fill="#252526" rx="3" stroke="#555"/><text x="${(x1 + x2) / 2}" y="${(y1 + y2) / 2}" fill="#0d6efd" font-size="10px" font-weight="bold" text-anchor="middle" dominant-baseline="central">${Math.round(v)}</text>`;
                svg += mk(obj.x + obj.w / 2, obj.y, obj.x + obj.w / 2, d.top.y, d.top.l) + mk(obj.x + obj.w / 2, obj.y + obj.h, obj.x + obj.w / 2, d.bottom.y, d.bottom.l) + mk(obj.x, obj.y + obj.h / 2, d.left.x, obj.y + obj.h / 2, d.left.l) + mk(obj.x + obj.w, obj.y + obj.h / 2, d.right.x, obj.y + obj.h / 2, d.right.l);

                                ${fix.type === 'door' ? `<button class="btn btn-sm btn-outline-warning py-0" onclick="flipFixture(${fix.id})"><i class="bi bi-arrow-left-right"></i></button>` : ''}

        function startDrag(e, item, type) {
            if (rulerMode) return;
            e.preventDefault();
            if (type === 'object') {
                if (item.locked || hiddenLayers.has(item.layer)) return;

                if (e.shiftKey) {
                    if (selectedObjects.has(item.id)) selectedObjects.delete(item.id); else selectedObjects.add(item.id);
                } else {
                    if (!selectedObjects.has(item.id)) { selectedObjects.clear(); selectedObjects.add(item.id); }
                    selectedFixtures.clear();
                    renderFixturesStyle();
                }

                renderObjectsStyle();
                highlightInspectorItem('object', item.id);

                dragType = 'object'; startMouseX = e.clientX; startMouseY = e.clientY; dragGroup = [];
                selectedObjects.forEach(id => {
                    const o = objects.find(ob => ob.id === id); if (o && !o.locked) dragGroup.push({ obj: o, startX: o.x, startY: o.y });
                });
                draggedItem = dragGroup.find(d => d.obj.id === item.id) || dragGroup[0];
            } else {
                if (item.locked) return;

                dragType = 'fixture'; draggedFixture = { obj: item, startPos: item.pos }; startMouseX = e.clientX; startMouseY = e.clientY;

                selectedObjects.clear();
                renderObjectsStyle();
                selectedFixtures.clear();
                selectedFixtures.add(item.id);
                renderFixturesStyle();

                highlightInspectorItem('fixture', item.id);
            }
        }

        function handleDrag(e) {
            if (rulerMode && rulerStart) {
                const rect = roomEl.getBoundingClientRect();
                const mx = (e.clientX - rect.left) / scale, my = (e.clientY - rect.top) / scale;
                const dist = Math.hypot(mx - rulerStart.x, my - rulerStart.y);
                rulerOverlay.innerHTML = `
                    <line x1="${rulerStart.x}" y1="${rulerStart.y}" x2="${mx}" y2="${my}" stroke="#0dcaf0" stroke-width="2" stroke-dasharray="5"/>
                    <circle cx="${rulerStart.x}" cy="${rulerStart.y}" r="4" fill="#0dcaf0"/>
                    <circle cx="${mx}" cy="${my}" r="4" fill="#0dcaf0"/>
                    <rect x="${mx + 10}" y="${my - 10}" width="60" height="20" fill="#252526" stroke="#0dcaf0" rx="3"/>
                    <text x="${mx + 40}" y="${my + 3}" fill="#0dcaf0" font-size="12" font-weight="bold" text-anchor="middle">${dist.toFixed(1)}cm</text>
                `;
                return;
            }

            if (!dragType) return;
            const dx = (e.clientX - startMouseX) / scale, dy = (e.clientY - startMouseY) / scale;

            if (dragType === 'object' && dragGroup.length > 0) {
                let effDx = dx, effDy = dy;
                if (isSnap && draggedItem) {
                    const snapX = Math.round((draggedItem.startX + dx) / snapGridSize) * snapGridSize;
                    const snapY = Math.round((draggedItem.startY + dy) / snapGridSize) * snapGridSize;
                    effDx = snapX - draggedItem.startX; effDy = snapY - draggedItem.startY;
                }
                if (isSnapWall && draggedItem) {
                    const thr = 15; let targetX = draggedItem.startX + effDx, targetY = draggedItem.startY + effDy;
                    if (targetX < thr) effDx = -draggedItem.startX; else if (targetX + draggedItem.obj.w > room.w - thr) effDx = (room.w - draggedItem.obj.w) - draggedItem.startX;
                    if (targetY < thr) effDy = -draggedItem.startY; else if (targetY + draggedItem.obj.h > room.h - thr) effDy = (room.h - draggedItem.obj.h) - draggedItem.startY;
                }
                dragGroup.forEach(d => { d.obj.x = d.startX + effDx; d.obj.y = d.startY + effDy; d.obj.el.style.left = d.obj.x + 'px'; d.obj.el.style.top = d.obj.y + 'px'; });
                checkCollisions(); updateDistances();
            } else if (dragType === 'fixture') {
                const rect = roomEl.getBoundingClientRect();
                const mx = (e.clientX - rect.left) / scale, my = (e.clientY - rect.top) / scale;
                const d = { top: Math.abs(my), bottom: Math.abs(room.h - my), left: Math.abs(mx), right: Math.abs(room.w - mx) };
                let cWall = 'top', minD = d.top; for (let w in d) if (d[w] < minD) { minD = d[w]; cWall = w; }
                draggedFixture.obj.wall = cWall;
                let rawPos = (cWall === 'top' || cWall === 'bottom') ? mx - draggedFixture.obj.size / 2 : my - draggedFixture.obj.size / 2;
                if (isSnap) rawPos = Math.round(rawPos / snapGridSize) * snapGridSize;
                const max = (cWall === 'top' || cWall === 'bottom') ? room.w : room.h;
                draggedFixture.obj.pos = Math.max(0, Math.min(rawPos, max - draggedFixture.obj.size));
                updateFixtureStyle(draggedFixture.obj); updateDimLines(draggedFixture.obj); checkCollisions();
            }
        }

        function stopDrag() {
            if (rulerMode && rulerStart) { rulerStart = null; return; }
            if (dragType) {
                let moved = false;
                if (dragType === 'object') dragGroup.forEach(d => { if (d.obj.x !== d.startX || d.obj.y !== d.startY) moved = true; });
                else if (dragType === 'fixture') if (draggedFixture.obj.pos !== draggedFixture.startPos) moved = true;
                if (moved) saveState();
                dragType = null; dragGroup = []; draggedFixture = null;
            }
        }

        function checkCollisions() {
            let roomCollision = false; let overlappingObjects = new Set();
            roomEl.style.borderColor = 'var(--room-border)'; roomEl.style.backgroundColor = 'var(--room-bg)';
            objects.forEach(obj => { if (obj.el) obj.el.style.backgroundColor = obj.color; });
            fixtures.forEach(fix => {
                if (fix.type === 'door' && fix.el) {
                    fix.el.querySelectorAll('.door-svg path, .door-svg line').forEach(p => p.setAttribute('stroke', '#2c3e50'));
                    const p = fix.el.querySelector('.door-svg path'); if (p) p.setAttribute('fill', 'rgba(240,173,78,0.3)');
                }
            });

            for (let i = 0; i < objects.length; i++) {
                let o1 = objects[i]; if (hiddenLayers.has(o1.layer)) continue;
                if (o1.x < 0 || o1.y < 0 || o1.x + o1.w > room.w || o1.y + o1.h > room.h) roomCollision = true;
                for (let j = i + 1; j < objects.length; j++) {
                    let o2 = objects[j]; if (hiddenLayers.has(o2.layer)) continue;
                    if (o1.layer === o2.layer && o1.x < o2.x + o2.w && o1.x + o1.w > o2.x && o1.y < o2.y + o2.h && o1.y + o1.h > o2.y) {
                        overlappingObjects.add(o1); overlappingObjects.add(o2);
                    }
                }
                fixtures.forEach(fix => {
                    if (fix.type === 'door') {
                        let sx, sy, sw = fix.size, sh = fix.size;
                        if (fix.wall === 'top') { sx = fix.pos; sy = 0; } else if (fix.wall === 'bottom') { sx = fix.pos; sy = room.h - sw; }
                        else if (fix.wall === 'left') { sx = 0; sy = fix.pos; } else if (fix.wall === 'right') { sx = room.w - sw; sy = fix.pos; }
                        if (o1.x < sx + sw && o1.x + o1.w > sx && o1.y < sy + sh && o1.y + o1.h > sy) {
                            overlappingObjects.add(o1);
                            if (fix.el) {
                                fix.el.querySelectorAll('.door-svg path, .door-svg line').forEach(p => p.setAttribute('stroke', '#dc3545'));
                                const p = fix.el.querySelector('.door-svg path'); if (p) p.setAttribute('fill', 'rgba(220,53,69,0.3)');
                            }
                        }
                    }
                });
            }
            if (roomCollision) { roomEl.style.borderColor = '#dc3545'; roomEl.style.backgroundColor = 'var(--danger-bg)'; }
            overlappingObjects.forEach(obj => { if (obj.el) obj.el.style.backgroundColor = '#dc3545'; });
        }

        init();
    </script>
